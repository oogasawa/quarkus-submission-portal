---
# Default deny all
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: submission-portal
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow DNS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns
  namespace: submission-portal
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow portal -> PostgreSQL (in-namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-portal-to-postgres
  namespace: submission-portal
spec:
  podSelector:
    matchLabels:
      app: submission-portal
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
---
# Allow portal -> Keycloak (submission-keycloak namespace)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-keycloak
  namespace: submission-portal
spec:
  podSelector:
    matchLabels:
      app: submission-portal
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 443
---
# Allow postgres to accept connections
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-postgres
  namespace: submission-portal
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: submission-portal
      ports:
        - protocol: TCP
          port: 5432
---
# Allow portal -> MinIO (minio namespace, port 9000)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-minio
  namespace: submission-portal
spec:
  podSelector:
    matchLabels:
      app: submission-portal
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: minio
      ports:
        - protocol: TCP
          port: 9000
---
# Allow ingress to portal from any (for Gateway/Envoy)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-portal
  namespace: submission-portal
spec:
  podSelector:
    matchLabels:
      app: submission-portal
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
---
# Allow portal -> Kubernetes API server (port 6443)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-k8s-api
  namespace: submission-portal
spec:
  podSelector:
    matchLabels:
      app: submission-portal
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 6443
        - protocol: TCP
          port: 16443
---
# Allow portal -> NFS server (port 2049 for NFS-k8s storage)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-nfs
  namespace: submission-portal
spec:
  podSelector:
    matchLabels:
      app: submission-portal
  policyTypes:
    - Egress
  egress:
    - ports:
        - protocol: TCP
          port: 2049
        - protocol: UDP
          port: 2049
