---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: submission-portal-route
  namespace: submission-portal
spec:
  parentRefs:
    - name: submission-gateway
      namespace: submission-keycloak
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /submission-portal
      filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Forwarded-Proto
                value: https
      backendRefs:
        - name: submission-portal
          port: 8080
