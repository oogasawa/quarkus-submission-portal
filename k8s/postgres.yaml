---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: submission-portal
type: Opaque
stringData:
  POSTGRES_DB: submission_portal
  POSTGRES_USER: submission
  POSTGRES_PASSWORD: submission-db-pass-2026
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: submission-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data-pvc
  namespace: submission-portal
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: submission-portal
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
