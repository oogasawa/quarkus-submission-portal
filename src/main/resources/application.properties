# Application
quarkus.application.name=submission-portal
quarkus.http.port=8080
quarkus.http.root-path=${BASE_PATH:/submission-portal}

# Proxy: trust X-Forwarded-* headers from HAProxy/Envoy Gateway
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.allow-x-forwarded=true
quarkus.http.proxy.enable-forwarded-host=true
quarkus.http.proxy.enable-forwarded-prefix=true
quarkus.oidc.authentication.force-redirect-https-scheme=true

# OIDC (Keycloak) - submission realm
quarkus.oidc.enabled=true
quarkus.oidc.auth-server-url=${QUARKUS_OIDC_AUTH_SERVER_URL:https://192.168.5.25/submission-keycloak/realms/submission}
quarkus.oidc.client-id=submission-portal
quarkus.oidc.credentials.secret=${SUBMISSION_PORTAL_OIDC_SECRET}
quarkus.oidc.application-type=web-app
quarkus.oidc.authentication.redirect-path=${BASE_PATH:/submission-portal}/dashboard
quarkus.oidc.token.refresh-expired=true
quarkus.oidc.token-path=/protocol/openid-connect/token
quarkus.oidc.jwks-path=/protocol/openid-connect/certs
quarkus.oidc.authentication.session-age-extension=PT2H
quarkus.oidc.authentication.cookie-path=/
quarkus.oidc.authentication.cookie-same-site=lax
quarkus.oidc.token-state-manager.split-tokens=true
quarkus.oidc.logout.path=${BASE_PATH:/submission-portal}/logout
quarkus.oidc.logout.post-logout-path=${BASE_PATH:/submission-portal}/
quarkus.tls.trust-all=true

# HTTP Auth Permissions
quarkus.http.auth.permission.public.paths=/,/en/
quarkus.http.auth.permission.public.policy=permit
quarkus.http.auth.permission.health.paths=/q/*
quarkus.http.auth.permission.health.policy=permit
quarkus.http.auth.permission.authenticated.paths=/dashboard,/en/dashboard,/session/*,/storage/*,/logout
quarkus.http.auth.permission.authenticated.policy=authenticated

# Logging
quarkus.log.category."com.scivicslab".level=INFO
quarkus.http.access-log.enabled=true
quarkus.http.access-log.pattern=%h %l %u %t "%r" %s %b

# Kubernetes Client
quarkus.kubernetes-client.trust-certs=true

# Database (PostgreSQL for INSDC registrations)
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5432/submission_portal}
quarkus.datasource.username=${DB_USER:submission}
quarkus.datasource.password=${DB_PASSWORD:submission}
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# S3 / MinIO storage
submission.s3.endpoint=${S3_ENDPOINT:http://minio.minio.svc:9000}
submission.s3.access-key=${S3_ACCESS_KEY:minio-admin}
submission.s3.secret-key=${S3_SECRET_KEY:changeme}
submission.s3.bucket=${S3_BUCKET:submission-portal}

# File upload
quarkus.http.body.uploads-directory=/tmp/uploads
quarkus.http.limits.max-body-size=500M

# submission-portal configuration
subportal.user-pods-namespace=${SUBPORTAL_USER_PODS_NAMESPACE:user-pods}
subportal.controller-namespace=${SUBPORTAL_CONTROLLER_NAMESPACE:submission-portal}
subportal.httproute-namespace=${SUBPORTAL_HTTPROUTE_NAMESPACE:submission-keycloak}
subportal.gateway-names=${SUBPORTAL_GATEWAY_NAMES:submission-gateway}
subportal.storage-type-options=${SUBPORTAL_STORAGE_TYPE_OPTIONS:s3,nfs-k8s}
subportal.default-storage-type=${SUBPORTAL_DEFAULT_STORAGE_TYPE:nfs-k8s}
subportal.idle-timeout-minutes=${SUBPORTAL_IDLE_TIMEOUT_MINUTES:1440}
subportal.max-lifetime-minutes=${SUBPORTAL_MAX_LIFETIME_MINUTES:10080}
subportal.max-sessions=${SUBPORTAL_MAX_SESSIONS:100}
subportal.max-sessions-per-user=${SUBPORTAL_MAX_SESSIONS_PER_USER:3}
subportal.unlimited-users=${SUBPORTAL_UNLIMITED_USERS:}

# Envoy Gateway SecurityPolicy OIDC config for session routes
subportal.session-oidc.issuer=https://192.168.5.25/submission-auth/realms/submission
subportal.session-oidc.authorization-endpoint=https://192.168.5.25/submission-auth/realms/submission/protocol/openid-connect/auth
subportal.session-oidc.token-endpoint=${SUBPORTAL_SESSION_OIDC_TOKEN_ENDPOINT:http://keycloak.submission-keycloak.svc:8080/submission-auth/realms/submission/protocol/openid-connect/token}
subportal.session-oidc.client-id=submission-portal
subportal.session-oidc.secret-name=submission-portal-oidc-secret
subportal.session-oidc.jwks-uri=${SUBPORTAL_SESSION_OIDC_JWKS_URI:http://keycloak.submission-keycloak.svc:8080/submission-auth/realms/submission/protocol/openid-connect/certs}

# NFS k8s-dedicated storage
subportal.nfs-k8s.server=${SUBPORTAL_NFS_K8S_SERVER:192.168.5.20}
subportal.nfs-k8s.base-path=${SUBPORTAL_NFS_K8S_BASE_PATH:/Public/submission-portal-data}
